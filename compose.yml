services:
  # 1. Vector Database for MITRE Grounding
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  # 2. Local LLM Runtime
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    # GPU Support: Enable if you have an NVIDIA card
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # 3. Knowledge Graph Database
  neo4j:
    image: neo4j:latest
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password # Default for dev; change in production
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # 4. FastAPI Extraction Engine
  ttp-api:
    build: .
    container_name: ttp-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - OLLAMA_HOST=http://ollama:11434
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - MODEL_NAME=deepseek-r1:8b
    depends_on:
      - qdrant
      - ollama
      - neo4j
    volumes:
      - ./app:/app

volumes:
  qdrant_storage:
  ollama_storage:
  neo4j_data:
  neo4j_logs:
