services:
  # 1. Vector Database for MITRE Grounding
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  # 2. Local LLM Runtime
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    # GPU Support: Enable if you have an NVIDIA card
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # 3. FastAPI Extraction Engine
  ttp-api:
    build: .
    container_name: ttp-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - OLLAMA_HOST=http://ollama:11434
      - MODEL_NAME=deepseek-r1:8b
    depends_on:
      - qdrant
      - ollama
    volumes:
      - ./app:/app

volumes:
  qdrant_storage:
  ollama_storage:
